<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小宇宙 — 觉</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg: #0a0a0a;
            --gold: #d4af37;
            --white: #f5f0e8;
            --white-90: rgba(245, 240, 232, 0.9);
            --white-60: rgba(245, 240, 232, 0.6);
            --white-30: rgba(245, 240, 232, 0.3);
            --white-10: rgba(245, 240, 232, 0.1);
            --font-display: 'Instrument Serif', Georgia, serif;
            --font-body: 'DM Sans', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--white);
            font-family: var(--font-body);
        }

        /* Universe canvas */
        #universe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* Stars background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--white);
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.6; }
        }

        /* Message bubbles */
        .message {
            position: absolute;
            padding: 12px 16px;
            background: rgba(245, 240, 232, 0.06);
            border: 1px solid var(--white-10);
            border-radius: 2px;
            max-width: 200px;
            cursor: default;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            transform: scale(0.8);
            animation: fadeIn 1s ease forwards;
        }

        .message:hover {
            background: rgba(245, 240, 232, 0.1);
            border-color: var(--gold);
            transform: scale(1.05);
            z-index: 10;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .message-nick {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--gold);
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        .message-text {
            font-size: 13px;
            color: var(--white-60);
            line-height: 1.6;
        }

        /* Asteroid button */
        .asteroid-btn {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--white-30);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
            z-index: 100;
        }

        .asteroid-btn:hover {
            border-color: var(--gold);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .asteroid-btn svg {
            width: 24px;
            height: 24px;
            color: var(--white-60);
            transition: color 0.4s ease;
        }

        .asteroid-btn:hover svg {
            color: var(--gold);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg);
            border: 1px solid var(--white-10);
            padding: 40px;
            max-width: 400px;
            width: 90%;
        }

        .modal h2 {
            font-family: var(--font-display);
            font-size: 24px;
            color: var(--white);
            margin-bottom: 8px;
        }

        .modal p {
            font-size: 14px;
            color: var(--white-30);
            margin-bottom: 24px;
        }

        .modal input,
        .modal textarea {
            width: 100%;
            background: var(--white-10);
            border: 1px solid var(--white-10);
            color: var(--white);
            font-family: var(--font-body);
            font-size: 14px;
            padding: 12px 16px;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .modal input:focus,
        .modal textarea:focus {
            border-color: var(--gold);
        }

        .modal textarea {
            height: 100px;
            resize: none;
        }

        .modal input::placeholder,
        .modal textarea::placeholder {
            color: var(--white-30);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--white-10);
            color: var(--white-60);
            font-family: var(--font-mono);
            font-size: 13px;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-cancel:hover {
            border-color: var(--white-30);
            color: var(--white);
        }

        .btn-submit {
            background: var(--gold);
            border: none;
            color: var(--bg);
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 700;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            background: #e8c84a;
        }

        /* Back button */
        .back-btn {
            position: fixed;
            top: 24px;
            left: 24px;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--white-30);
            text-decoration: none;
            transition: color 0.3s ease;
            z-index: 100;
        }

        .back-btn:hover {
            color: var(--gold);
        }

        /* Hint */
        .hint {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--white-10);
            letter-spacing: 0.1em;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .asteroid-btn {
                bottom: 20px;
                right: 20px;
                width: 48px;
                height: 48px;
            }

            .modal {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <a href="me.html" class="back-btn">← 返回 Me</a>

    <div class="stars" id="stars"></div>
    <canvas id="universe"></canvas>

    <button class="asteroid-btn" id="asteroidBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8v4l2 2"/>
            <circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/>
        </svg>
    </button>

    <div class="hint">点击右下角星球，留下你的痕迹</div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2>留下一颗星</h2>
            <p>在这片小宇宙中，留下你的痕迹。</p>
            <input type="text" id="nickname" placeholder="你的昵称" maxlength="20">
            <textarea id="content" placeholder="想说的话..." maxlength="200"></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" id="cancelBtn">取消</button>
                <button class="btn-submit" id="submitBtn">发布</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://universe-api.lyijian86.workers.dev';
        const canvas = document.getElementById('universe');
        const ctx = canvas.getContext('2d');
        const messagesContainer = document.getElementById('stars');

        // Resize canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Generate background stars
        function generateStars() {
            const starsEl = document.getElementById('stars');
            starsEl.innerHTML = '';
            const count = Math.floor(window.innerWidth * window.innerHeight / 5000);
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
                starsEl.appendChild(star);
            }
        }
        generateStars();

        // Floating particles on canvas
        const particles = [];
        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.size = Math.random() * 2 + 0.5;
                this.opacity = Math.random() * 0.3 + 0.1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(245, 240, 232, ${this.opacity})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Load messages
        async function loadMessages() {
            try {
                const res = await fetch(`${API_URL}/api/messages`);
                const messages = await res.json();
                renderMessages(messages);
            } catch (err) {
                console.error('Failed to load messages:', err);
            }
        }

        // Render messages
        function renderMessages(messages) {
            // Keep back button and hint
            const backBtn = document.querySelector('.back-btn');
            const hint = document.querySelector('.hint');
            const asteroidBtn = document.querySelector('.asteroid-btn');
            const modal = document.getElementById('modal');

            messagesContainer.innerHTML = '';
            messagesContainer.appendChild(backBtn);
            messagesContainer.appendChild(hint);

            messages.forEach((msg, index) => {
                const el = document.createElement('div');
                el.className = 'message';
                el.style.left = msg.x + '%';
                el.style.top = msg.y + '%';
                el.style.transform = `scale(${msg.size})`;
                el.style.animationDelay = (index * 0.1) + 's';
                el.innerHTML = `
                    <div class="message-nick">${escapeHtml(msg.nickname)}</div>
                    <div class="message-text">${escapeHtml(msg.content)}</div>
                `;
                messagesContainer.appendChild(el);
            });
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Modal
        const modal = document.getElementById('modal');
        const asteroidBtn = document.getElementById('asteroidBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const submitBtn = document.getElementById('submitBtn');

        asteroidBtn.addEventListener('click', () => {
            modal.classList.add('active');
            document.getElementById('nickname').focus();
        });

        cancelBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        // Submit
        submitBtn.addEventListener('click', async () => {
            const nickname = document.getElementById('nickname').value.trim();
            const content = document.getElementById('content').value.trim();

            if (!nickname || !content) {
                alert('请填写昵称和内容');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname, content }),
                });

                if (res.ok) {
                    const msg = await res.json();
                    // Add new message to view
                    const el = document.createElement('div');
                    el.className = 'message';
                    el.style.left = msg.x + '%';
                    el.style.top = msg.y + '%';
                    el.style.transform = `scale(${msg.size})`;
                    el.innerHTML = `
                        <div class="message-nick">${escapeHtml(msg.nickname)}</div>
                        <div class="message-text">${escapeHtml(msg.content)}</div>
                    `;
                    messagesContainer.appendChild(el);

                    // Clear form and close modal
                    document.getElementById('nickname').value = '';
                    document.getElementById('content').value = '';
                    modal.classList.remove('active');
                } else {
                    const err = await res.json();
                    alert(err.error || '发布失败');
                }
            } catch (err) {
                alert('网络错误，请重试');
            }
        });

        // Keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                modal.classList.remove('active');
            }
        });

        // Init
        loadMessages();
    </script>
</body>
</html>
