<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小宇宙 — 觉</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg: #0c0e0b;
            --gold: #a8b490;
            --white: #e4e0d8;
            --white-90: rgba(228, 224, 216, 0.9);
            --white-60: rgba(228, 224, 216, 0.55);
            --white-30: rgba(228, 224, 216, 0.25);
            --white-10: rgba(228, 224, 216, 0.07);
            --red: #e74c3c;
            --font-display: 'Lora', Georgia, serif;
            --font-body: 'DM Sans', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--white);
            font-family: var(--font-body);
        }

        /* Canvas */
        #universe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--white);
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.6; }
        }

        /* Messages */
        .message {
            position: absolute;
            padding: 12px 16px;
            background: rgba(245, 240, 232, 0.06);
            border: 1px solid var(--white-10);
            border-radius: 2px;
            max-width: 200px;
            cursor: default;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            transform: scale(0.8);
            animation: fadeIn 1s ease forwards;
            pointer-events: auto;
        }

        .message:hover {
            background: rgba(245, 240, 232, 0.1);
            border-color: var(--gold);
            transform: scale(1.05);
            z-index: 10;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: scale(1); }
        }

        .message-nick {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--gold);
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        .message-text {
            font-size: 13px;
            color: var(--white-60);
            line-height: 1.6;
        }

        .message-delete {
            position: absolute;
            top: 4px;
            right: 6px;
            font-size: 16px;
            color: var(--white-30);
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s ease;
            line-height: 1;
            padding: 6px;
            pointer-events: auto;
            z-index: 20;
        }

        .message:hover .message-delete {
            opacity: 1;
        }

        .message-delete:hover {
            color: var(--red);
        }

        /* Admin mode: always show delete buttons */
        body.admin-mode .message-delete {
            opacity: 0.6;
        }

        body.admin-mode .message:hover .message-delete {
            opacity: 1;
        }

        /* UI Elements */
        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        .ui-layer > * {
            pointer-events: auto;
        }

        .back-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--white-30);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .back-btn:hover { color: var(--gold); }

        .hint {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--white-10);
            letter-spacing: 0.1em;
            pointer-events: none;
        }

        .admin-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--white-10);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .admin-btn:hover { color: var(--white-30); }

        /* Asteroid */
        .asteroid-btn {
            position: absolute;
            bottom: 32px;
            right: 32px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--white-30);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
        }

        .asteroid-btn:hover {
            border-color: var(--gold);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .asteroid-btn svg {
            width: 24px;
            height: 24px;
            color: var(--white-60);
            transition: color 0.4s ease;
        }

        .asteroid-btn:hover svg { color: var(--gold); }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg);
            border: 1px solid var(--white-10);
            padding: 40px;
            max-width: 400px;
            width: 90%;
        }

        .modal h2 {
            font-family: var(--font-display);
            font-size: 24px;
            color: var(--white);
            margin-bottom: 8px;
        }

        .modal p {
            font-size: 14px;
            color: var(--white-30);
            margin-bottom: 24px;
        }

        .modal input,
        .modal textarea {
            width: 100%;
            background: var(--white-10);
            border: 1px solid var(--white-10);
            color: var(--white);
            font-family: var(--font-body);
            font-size: 14px;
            padding: 12px 16px;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .modal input:focus,
        .modal textarea:focus { border-color: var(--gold); }

        .modal textarea { height: 100px; resize: none; }

        .modal input::placeholder,
        .modal textarea::placeholder { color: var(--white-30); }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--white-10);
            color: var(--white-60);
            font-family: var(--font-mono);
            font-size: 13px;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-cancel:hover {
            border-color: var(--white-30);
            color: var(--white);
        }

        .btn-submit {
            background: var(--gold);
            border: none;
            color: var(--bg);
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 700;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit:hover { background: #e8c84a; }

        .btn-danger {
            background: var(--red);
            border: none;
            color: var(--white);
            font-family: var(--font-mono);
            font-size: 13px;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-danger:hover { background: #c0392b; }

        @media (max-width: 768px) {
            .asteroid-btn {
                bottom: 20px;
                right: 20px;
                width: 48px;
                height: 48px;
            }
            .modal { padding: 24px; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <canvas id="universe"></canvas>

    <div class="ui-layer">
        <a href="me.html" class="back-btn">← 返回 Me</a>
        <a href="#" class="admin-btn" id="adminBtn">管理</a>
        <div class="hint">点击右下角星球，留下你的痕迹</div>
        <button class="asteroid-btn" id="asteroidBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 8v4l2 2"/>
                <circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/>
            </svg>
        </button>
    </div>

    <!-- Post modal -->
    <div class="modal-overlay" id="postModal">
        <div class="modal">
            <h2>留下一颗星</h2>
            <p>在这片小宇宙中，留下你的痕迹。</p>
            <input type="text" id="nickname" placeholder="你的昵称" maxlength="20">
            <textarea id="content" placeholder="想说的话..." maxlength="200"></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" id="cancelPost">取消</button>
                <button class="btn-submit" id="submitPost">发布</button>
            </div>
        </div>
    </div>

    <!-- Admin modal -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal">
            <h2>管理员登录</h2>
            <p>输入密码管理所有留言。</p>
            <input type="password" id="adminPassword" placeholder="密码">
            <div class="modal-actions">
                <button class="btn-cancel" id="cancelAdmin">取消</button>
                <button class="btn-submit" id="submitAdmin">登录</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://universe-api.lyijian86.workers.dev';
        const canvas = document.getElementById('universe');
        const ctx = canvas.getContext('2d');
        const messagesEl = document.getElementById('messages');

        let isAdmin = false;
        let currentNickname = localStorage.getItem('universe_nick') || '';

        // Canvas resize
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Generate stars
        function generateStars() {
            const starsEl = document.getElementById('stars');
            starsEl.innerHTML = '';
            const count = Math.floor(window.innerWidth * window.innerHeight / 5000);
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
                starsEl.appendChild(star);
            }
        }
        generateStars();

        // Particles
        const particles = [];
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.size = Math.random() * 2 + 0.5;
                this.opacity = Math.random() * 0.3 + 0.1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(245, 240, 232, ${this.opacity})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // Load messages
        async function loadMessages() {
            try {
                const res = await fetch(`${API_URL}/api/messages`);
                const messages = await res.json();
                renderMessages(messages);
            } catch (err) {
                console.error('Failed to load messages:', err);
            }
        }

        // Render messages
        function renderMessages(messages) {
            const starsEl = document.getElementById('stars');
            // Remove old messages but keep stars
            starsEl.querySelectorAll('.message').forEach(el => el.remove());

            messages.forEach((msg, index) => {
                const el = document.createElement('div');
                el.className = 'message';
                el.style.left = msg.x + '%';
                el.style.top = msg.y + '%';
                el.style.transform = `scale(${msg.size})`;
                el.style.animationDelay = (index * 0.05) + 's';
                el.dataset.id = msg.id;
                el.dataset.nick = msg.nickname;

                if (isAdmin || msg.nickname === currentNickname) {
                    const del = document.createElement('span');
                    del.className = 'message-delete';
                    del.textContent = '×';
                    del.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        if (confirm('确定删除这条留言？')) {
                            await deleteMessage(msg.id);
                        }
                    });
                    el.appendChild(del);
                }

                const nick = document.createElement('div');
                nick.className = 'message-nick';
                nick.textContent = msg.nickname;
                el.appendChild(nick);

                const text = document.createElement('div');
                text.className = 'message-text';
                text.textContent = msg.content;
                el.appendChild(text);

                starsEl.appendChild(el);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Delete message
        async function deleteMessage(id) {
            try {
                const headers = { 'Content-Type': 'application/json' };
                if (isAdmin) {
                    headers['X-Admin-Token'] = localStorage.getItem('admin_token') || '';
                }
                const res = await fetch(`${API_URL}/api/messages/${id}`, {
                    method: 'DELETE',
                    headers,
                });
                if (res.ok) {
                    loadMessages();
                } else {
                    alert('删除失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }

        // Post modal
        const postModal = document.getElementById('postModal');
        const asteroidBtn = document.getElementById('asteroidBtn');
        const cancelPost = document.getElementById('cancelPost');
        const submitPost = document.getElementById('submitPost');

        asteroidBtn.addEventListener('click', () => {
            postModal.classList.add('active');
            if (currentNickname) {
                document.getElementById('nickname').value = currentNickname;
            }
            document.getElementById('nickname').focus();
        });

        cancelPost.addEventListener('click', () => postModal.classList.remove('active'));
        postModal.addEventListener('click', (e) => {
            if (e.target === postModal) postModal.classList.remove('active');
        });

        submitPost.addEventListener('click', async () => {
            const nickname = document.getElementById('nickname').value.trim();
            const content = document.getElementById('content').value.trim();

            if (!nickname || !content) {
                alert('请填写昵称和内容');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname, content }),
                });

                if (res.ok) {
                    localStorage.setItem('universe_nick', nickname);
                    currentNickname = nickname;
                    document.getElementById('nickname').value = '';
                    document.getElementById('content').value = '';
                    postModal.classList.remove('active');
                    loadMessages();
                } else {
                    const err = await res.json();
                    alert(err.error || '发布失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        });

        // Admin modal
        const adminModal = document.getElementById('adminModal');
        const adminBtn = document.getElementById('adminBtn');
        const cancelAdmin = document.getElementById('cancelAdmin');
        const submitAdmin = document.getElementById('submitAdmin');

        adminBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (isAdmin) {
                isAdmin = false;
                document.body.classList.remove('admin-mode');
                localStorage.removeItem('admin_token');
                adminBtn.textContent = '管理';
                loadMessages();
            } else {
                adminModal.classList.add('active');
                document.getElementById('adminPassword').focus();
            }
        });

        cancelAdmin.addEventListener('click', () => adminModal.classList.remove('active'));
        adminModal.addEventListener('click', (e) => {
            if (e.target === adminModal) adminModal.classList.remove('active');
        });

        submitAdmin.addEventListener('click', async () => {
            const password = document.getElementById('adminPassword').value;
            if (!password) return;

            try {
                const res = await fetch(`${API_URL}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password }),
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('admin_token', data.token);
                    isAdmin = true;
                    document.body.classList.add('admin-mode');
                    adminBtn.textContent = '退出管理';
                    adminModal.classList.remove('active');
                    document.getElementById('adminPassword').value = '';
                    loadMessages();
                } else {
                    alert('密码错误');
                }
            } catch (err) {
                alert('网络错误');
            }
        });

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                postModal.classList.remove('active');
                adminModal.classList.remove('active');
            }
        });

        // Check admin session
        if (localStorage.getItem('admin_token')) {
            isAdmin = true;
            document.body.classList.add('admin-mode');
            adminBtn.textContent = '退出管理';
        }

        // Init
        loadMessages();
    </script>
</body>
</html>
