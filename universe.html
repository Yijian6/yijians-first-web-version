<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title>小宇宙 — 觉</title>
    <style>
        @font-face {
            font-family: 'DM Sans';
            font-style: normal;
            font-weight: 300 500;
            font-display: swap;
            src: url('fonts/dm-sans-latin-300-8ca1b7.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Lora';
            font-style: normal;
            font-weight: 400 600;
            font-display: swap;
            src: url('fonts/lora-latin-400-ecda3b.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Lora';
            font-style: italic;
            font-weight: 400 500;
            font-display: swap;
            src: url('fonts/lora-latin-italic-400-6d4ac4.woff2') format('woff2');
        }
        @font-face {
            font-family: 'JetBrains Mono';
            font-style: normal;
            font-weight: 400 700;
            font-display: swap;
            src: url('fonts/jetbrains-mono-latin-400-480c06.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Noto Serif SC';
            font-style: normal;
            font-weight: 400 600;
            font-display: swap;
            src: url('fonts/noto-serif-sc-400.woff2') format('woff2');
        }

        :root {
            --bg: #060a10;
            --gold: #a8cc88;
            --white: #c8d4e0;
            --white-90: rgba(200, 212, 224, 0.9);
            --white-60: rgba(200, 212, 224, 0.55);
            --white-30: rgba(200, 212, 224, 0.25);
            --white-10: rgba(200, 212, 224, 0.08);
            --star-cool: #5b8abf;
            --star-warm: #c8a84e;
            --nebula-1: rgba(40, 80, 140, 0.06);
            --nebula-2: rgba(60, 140, 100, 0.04);
            --nebula-3: rgba(100, 60, 140, 0.03);
            --red: #e74c3c;
            --font-display: 'Lora', Georgia, serif;
            --font-body: 'DM Sans', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --visual-viewport-height: 100vh;
            --visual-viewport-top: 0px;
            --visual-viewport-bottom: 0px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--white);
            font-family: var(--font-body);
            cursor: crosshair;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            color-scheme: dark;
        }

        /* Nebula background */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 30%, var(--nebula-1), transparent),
                radial-gradient(ellipse 60% 80% at 75% 70%, var(--nebula-2), transparent),
                radial-gradient(ellipse 50% 40% at 50% 20%, var(--nebula-3), transparent);
            pointer-events: none;
            z-index: 0;
        }

        /* Grain texture */
        body::after {
            content: '';
            position: fixed; inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* Canvas layers */
        canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
        }
        #bgCanvas { z-index: 1; }
        #mainCanvas { z-index: 2; }

        /* Message tooltip */
        .tooltip {
            position: fixed;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            max-width: 280px;
        }
        .tooltip.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .tooltip-inner {
            background: rgba(8, 14, 24, 0.92);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(200, 212, 224, 0.1);
            padding: 16px 20px;
            position: relative;
        }
        .tooltip-inner::before {
            content: '';
            position: absolute; top: 0; left: 0;
            width: 3px; height: 100%;
            background: linear-gradient(to bottom, var(--gold), var(--star-cool));
        }
        .tooltip-nick {
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 6px;
        }
        .tooltip-text {
            font-size: 13px;
            color: var(--white-90);
            line-height: 1.7;
        }
        .tooltip-time {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--white-30);
            margin-top: 8px;
            letter-spacing: 0.08em;
        }

        /* UI Layer */
        .ui-layer {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 50;
        }
        .ui-layer > * { pointer-events: auto; }

        /* Header */
        .header {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .back-btn {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.08em;
            color: var(--white-30);
            text-decoration: none;
            transition: color 0.3s ease;
            display: flex; align-items: center; gap: 6px;
        }
        .back-btn:hover { color: var(--white); }
        .back-btn svg {
            width: 14px; height: 14px;
            stroke: currentColor; fill: none;
            stroke-width: 1.5;
        }

        .header-right {
            display: flex; align-items: center; gap: 16px;
        }
        .star-count {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--white-30);
        }
        .star-count strong {
            color: var(--gold);
            font-size: 14px;
            font-weight: 400;
            font-family: var(--font-display);
        }
        .load-status {
            min-height: 44px;
            padding: 0 8px;
            border: 0;
            background: transparent;
            color: var(--star-warm);
            font: 10px/1.2 var(--font-mono);
            letter-spacing: 0.04em;
            cursor: pointer;
        }
        .load-status[hidden] { display: none; }
        .admin-btn {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.08em;
            color: var(--white-10);
            text-decoration: none;
            transition: color 0.3s ease;
            cursor: pointer;
        }
        .admin-btn:hover { color: var(--white-30); }

        /* Title overlay */
        .title-block {
            position: absolute;
            bottom: 100px;
            left: 24px;
            pointer-events: none;
            opacity: 0.6;
            transition: opacity 0.5s ease;
        }
        .title-block:hover { opacity: 1; }
        .title-label {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--white-30);
            margin-bottom: 6px;
        }
        .title-main {
            font-family: var(--font-display);
            font-size: clamp(28px, 5vw, 48px);
            font-weight: 400;
            color: var(--white);
            line-height: 1.15;
            letter-spacing: -0.02em;
        }
        .title-main em {
            font-style: italic;
            color: var(--gold);
        }
        .title-sub {
            font-size: 12px;
            color: var(--white-30);
            margin-top: 8px;
            max-width: 260px;
            line-height: 1.6;
        }

        /* Post button */
        .post-btn {
            position: absolute;
            bottom: 28px; right: 28px;
            width: 52px; height: 52px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--white-30);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }
        .post-btn::before {
            content: '';
            position: absolute; inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle, var(--gold), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .post-btn:hover::before { opacity: 0.15; }
        .post-btn:hover {
            border-color: var(--gold);
            transform: scale(1.08);
            box-shadow: 0 0 24px rgba(168, 204, 136, 0.15), 0 0 60px rgba(168, 204, 136, 0.05);
        }
        .post-btn svg {
            width: 20px; height: 20px;
            color: var(--white-60);
            transition: color 0.4s ease;
            position: relative; z-index: 1;
        }
        .post-btn:hover svg { color: var(--gold); }

        /* Hint */
        .hint {
            position: absolute;
            bottom: 42px; right: 92px;
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.12em;
            color: var(--white-10);
            white-space: nowrap;
            transition: opacity 0.4s ease;
        }

        /* Modal — Glass */
        .modal-overlay {
            position: fixed;
            top: var(--visual-viewport-top);
            right: 0;
            left: 0;
            height: var(--visual-viewport-height);
            background: rgba(4, 6, 12, 0.85);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center; justify-content: center;
            z-index: 200;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: rgba(10, 16, 28, 0.95);
            border: 1px solid rgba(200, 212, 224, 0.08);
            padding: 40px;
            max-width: 420px;
            width: 90%;
            max-height: 90vh;
            max-height: calc(var(--visual-viewport-height) - 32px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }
        .modal::before {
            content: '';
            position: absolute; top: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(to right, var(--gold), var(--star-cool), transparent);
        }

        .modal h2 {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 400;
            color: var(--white);
            margin-bottom: 4px;
        }
        .modal .modal-sub {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--white-30);
            margin-bottom: 28px;
        }

        .modal input, .modal textarea {
            width: 100%;
            background: rgba(200, 212, 224, 0.04);
            border: 1px solid rgba(200, 212, 224, 0.08);
            border-radius: 0;
            -webkit-appearance: none;
            color: var(--white);
            font-family: var(--font-body);
            font-size: 16px;
            padding: 14px 16px;
            margin-bottom: 14px;
            outline: none;
            transition: border-color 0.3s ease, background 0.3s ease;
        }
        .modal input:focus, .modal textarea:focus {
            border-color: var(--gold);
            background: rgba(168, 204, 136, 0.03);
        }
        .modal textarea { height: 110px; resize: none; line-height: 1.6; }
        .modal input::placeholder, .modal textarea::placeholder {
            color: var(--white-30);
            font-size: 13px;
        }

        .modal-actions {
            display: flex; gap: 10px;
            justify-content: flex-end;
            margin-top: 4px;
        }
        .btn-cancel {
            background: transparent;
            border: 1px solid var(--white-10);
            color: var(--white-60);
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.06em;
            padding: 10px 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 44px;
            min-height: 44px;
        }
        .btn-cancel:hover { border-color: var(--white-30); color: var(--white); }

        .btn-submit {
            background: var(--gold);
            border: none;
            color: var(--bg);
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            padding: 10px 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 44px;
            min-height: 44px;
        }
        .btn-submit:hover { background: #bfdf9e; }

        .btn-danger {
            background: var(--red);
            border: none;
            color: white;
            font-family: var(--font-mono);
            font-size: 11px;
            padding: 10px 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-danger:hover { background: #c0392b; }

        /* Delete badges on hover */
        .delete-zone {
            position: fixed;
            z-index: 80;
            pointer-events: auto;
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            color: var(--white-30);
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease, background 0.2s ease;
        }
        .delete-zone::before {
            content: '';
            position: absolute;
            inset: -10px;
        }
        .delete-zone.visible { opacity: 1; }
        .delete-zone:hover {
            background: rgba(231, 76, 60, 0.3);
            color: white;
            transform: scale(1.15);
        }

        body.admin-mode .delete-zone.visible { opacity: 0.8; }

        @media (max-width: 768px) {
            .ui-layer::before {
                content: '';
                position: absolute;
                inset: max(12px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom)) 12px;
                border: 1px solid rgba(200, 212, 224, 0.18);
                border-radius: 8px;
                box-shadow: inset 0 0 36px rgba(168, 204, 136, 0.04);
                pointer-events: none;
            }
            .header { padding: 22px 22px; }
            .title-block {
                left: 24px;
                right: 86px;
                bottom: 88px;
                opacity: 0.82;
            }
            .title-main { font-size: clamp(26px, 9vw, 36px); }
            .title-sub { max-width: 210px; font-size: 11px; }
            .post-btn {
                bottom: max(24px, calc(env(safe-area-inset-bottom) + 12px));
                right: max(24px, calc(env(safe-area-inset-right) + 12px));
                width: 50px;
                height: 50px;
                border-color: rgba(168, 204, 136, 0.48);
                background: rgba(8, 14, 24, 0.72);
                box-shadow: 0 0 28px rgba(168, 204, 136, 0.12);
            }
            .hint { display: none; }
            .modal-overlay.active {
                align-items: flex-start;
                padding:
                    max(20px, calc(env(safe-area-inset-top) + 12px))
                    max(16px, env(safe-area-inset-right))
                    max(16px, calc(env(safe-area-inset-bottom) + var(--visual-viewport-bottom)))
                    max(16px, env(safe-area-inset-left));
            }
            .modal {
                width: 100%;
                padding: 24px;
                border-color: rgba(200, 212, 224, 0.22);
                box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(168, 204, 136, 0.08);
            }
            .modal input, .modal textarea {
                background: rgba(200, 212, 224, 0.07);
                border-color: rgba(200, 212, 224, 0.2);
            }
            .modal-actions { gap: 12px; }
            .btn-cancel, .btn-submit { min-height: 44px; padding: 12px 18px; }
            .tooltip {
                left: 20px !important;
                right: 20px;
                max-width: none;
            }
        }

        @media (hover: none) {
            body::after { display: none; }
            .back-btn:hover,
            .admin-btn:hover { color: inherit; }
            .post-btn:hover {
                border-color: var(--white-30);
                transform: none;
                box-shadow: none;
            }
            .post-btn:hover::before { opacity: 0; }
            .post-btn:hover svg { color: var(--white-60); }
            .post-btn:active { transform: scale(0.96); opacity: 0.82; }
        }

        @media (prefers-reduced-transparency: reduce) {
            .tooltip-inner,
            .modal-overlay {
                -webkit-backdrop-filter: none;
                backdrop-filter: none;
            }
            .tooltip-inner { background: #080e18; }
            .modal-overlay { background: rgba(4, 6, 12, 0.97); }
        }

        @media (forced-colors: active) {
            .post-btn,
            .modal,
            .modal input,
            .modal textarea,
            .btn-cancel,
            .btn-submit,
            .delete-zone {
                border: 1px solid ButtonText;
                forced-color-adjust: auto;
            }
            :focus-visible { outline: 2px solid Highlight; outline-offset: 3px; }
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <canvas id="mainCanvas"></canvas>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip">
        <div class="tooltip-inner">
            <div class="tooltip-nick" id="tooltipNick"></div>
            <div class="tooltip-text" id="tooltipText"></div>
            <div class="tooltip-time" id="tooltipTime"></div>
        </div>
    </div>

    <!-- UI -->
    <div class="ui-layer">
        <div class="header">
            <a href="me.html" class="back-btn">
                <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                <span>返回</span>
            </a>
            <div class="header-right">
                <button type="button" class="load-status" id="retryLoad" hidden>网络异常 · 重试</button>
                <div class="star-count"><strong id="msgCount">0</strong> STARS</div>
                <a href="#" class="admin-btn" id="adminBtn">ADM</a>
            </div>
        </div>

        <div class="title-block">
            <div class="title-label">Constellation Archive</div>
            <h1 class="title-main">星座<em>档案</em></h1>
            <p class="title-sub">每颗星都是一个人留下来的痕迹。<br>谢谢你发现这里，经过我的生命！</p>
        </div>

        <span class="hint">留下一颗属于你的星 →</span>
        <button class="post-btn" id="postBtn" type="button" aria-label="留下一颗星">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <path d="M12 5v14M5 12h14"/>
            </svg>
        </button>
    </div>

    <!-- Post Modal -->
    <div class="modal-overlay" id="postModal" role="dialog" aria-modal="true" aria-labelledby="postModalTitle" aria-hidden="true">
        <div class="modal">
            <h2 id="postModalTitle">留下一颗星</h2>
            <div class="modal-sub">Leave your mark in the constellation</div>
            <input type="text" id="nickname" placeholder="你的名字" maxlength="20" autocomplete="off">
            <textarea id="content" placeholder="想说的话…" maxlength="200"></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" id="cancelPost">取消</button>
                <button class="btn-submit" id="submitPost">发布</button>
            </div>
        </div>
    </div>

    <!-- Admin Modal -->
    <div class="modal-overlay" id="adminModal" role="dialog" aria-modal="true" aria-labelledby="adminModalTitle" aria-hidden="true">
        <div class="modal">
            <h2 id="adminModalTitle">管理员</h2>
            <div class="modal-sub">Admin authentication</div>
            <input type="password" id="adminPassword" placeholder="密码" autocomplete="off">
            <div class="modal-actions">
                <button class="btn-cancel" id="cancelAdmin">取消</button>
                <button class="btn-submit" id="submitAdmin">登录</button>
            </div>
        </div>
    </div>

    <script src="js/compat.js"></script>
    <script>
    (function() {
        'use strict';

        const API_URL = '';
        const bgCanvas = document.getElementById('bgCanvas');
        const mainCanvas = document.getElementById('mainCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        const ctx = mainCanvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        const compat = window.JueCompat;
        const storage = compat.storage;
        let dpr = 1;
        const reducedMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
        let reducedMotion = reducedMotionQuery.matches;
        let animationId = null;
        let pageActive = true;

        let W, H;
        let isAdmin = false;
        let currentNickname = storage.get('universe_nick', '') || '';
        let messages = [];
        let starNodes = [];
        let hoveredStar = null;
        let mouseX = -1000, mouseY = -1000;
        let time = 0;
        let constellationLines = [];

        function updateDpr() {
            var caps = compat.getInputCapabilities();
            var maxDpr = caps.coarsePointer ? 1.5 : 2;
            dpr = Math.min(window.devicePixelRatio || 1, maxDpr);
        }

        function parseDbDate(value) {
            if (value instanceof Date) {
                return Number.isFinite(value.getTime()) ? new Date(value.getTime()) : null;
            }
            if (typeof value !== 'string') return null;
            var text = value.trim();
            if (!text) return null;

            if (/^\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}(?:\.\d+)?$/.test(text)) {
                text = text.replace(/\s+/, 'T') + 'Z';
            }

            var timestamp = Date.parse(text);
            return Number.isFinite(timestamp) ? new Date(timestamp) : null;
        }

        // ── Resize ──
        function resize() {
            updateDpr();
            W = window.innerWidth;
            H = window.innerHeight;
            bgCanvas.width = mainCanvas.width = W * dpr;
            bgCanvas.height = mainCanvas.height = H * dpr;
            bgCanvas.style.width = mainCanvas.style.width = W + 'px';
            bgCanvas.style.height = mainCanvas.style.height = H + 'px';
            bgCtx.scale(dpr, dpr);
            ctx.scale(dpr, dpr);
            generateBgStars();
            drawBackground();
            buildConstellationLines();
            if (reducedMotion || !animationId) drawScene();
        }

        // ── Background Stars (3 layers) ──
        let bgStars = [];
        function generateBgStars() {
            bgStars = [];
            const area = W * H;
            const counts = [Math.floor(area / 3000), Math.floor(area / 6000), Math.floor(area / 12000)];
            for (let layer = 0; layer < 3; layer++) {
                for (let i = 0; i < counts[layer]; i++) {
                    bgStars.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        r: 0.3 + Math.random() * (layer === 0 ? 0.6 : layer === 1 ? 1.0 : 1.4),
                        alpha: 0.15 + Math.random() * 0.25,
                        phase: Math.random() * Math.PI * 2,
                        speed: 0.3 + Math.random() * 0.5,
                        layer: layer
                    });
                }
            }
        }

        function drawBackground() {
            bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
            bgCtx.clearRect(0, 0, W, H);
            bgStars.forEach(function(s) {
                var a = s.alpha * (0.5 + 0.5 * Math.sin(time * s.speed + s.phase));
                bgCtx.beginPath();
                bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                bgCtx.fillStyle = 'rgba(200, 212, 224, ' + a + ')';
                bgCtx.fill();
            });
        }

        // ── Star Nodes (Messages) ──
        function buildStarNodes(msgs) {
            var now = Date.now();
            starNodes = msgs.map(function(msg, i) {
                var parsedDate = parseDbDate(msg.created_at);
                var age = parsedDate ? (now - parsedDate.getTime()) / (1000 * 60 * 60 * 24) : null;
                var warmth = age === null ? 0.5 : Math.max(0, Math.min(1, 1 - age / 30));
                var contentLen = msg.content ? msg.content.length : 10;
                var radius = Math.min(4 + contentLen / 25, 8);
                var xPercent = Number(msg.x);
                var yPercent = Number(msg.y);
                if (!Number.isFinite(xPercent)) xPercent = 50;
                if (!Number.isFinite(yPercent)) yPercent = 50;
                return {
                    id: msg.id,
                    nickname: msg.nickname,
                    content: msg.content,
                    created_at: msg.created_at,
                    parsedDate: parsedDate,
                    x: (xPercent / 100) * (W - 120) + 60,
                    y: (yPercent / 100) * (H - 160) + 80,
                    radius: radius,
                    warmth: warmth,
                    phase: (i * 1.37) % (Math.PI * 2),
                    pulseSpeed: 0.5 + Math.random() * 0.5,
                    birthTime: time,
                    alpha: 1
                };
            });
            buildConstellationLines();
        }

        function getStarColor(warmth, alpha) {
            var r = Math.round(91 + warmth * 109);
            var g = Math.round(138 + warmth * 30);
            var b = Math.round(191 - warmth * 113);
            return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
        }

        // ── Constellation Lines ──
        var CONSTELLATION_DIST = 220;
        function buildConstellationLines() {
            constellationLines = [];
            for (var i = 0; i < starNodes.length; i++) {
                for (var j = i + 1; j < starNodes.length; j++) {
                    var a = starNodes[i], b = starNodes[j];
                    var dx = a.x - b.x, dy = a.y - b.y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < CONSTELLATION_DIST) {
                        constellationLines.push({
                            a: a,
                            b: b,
                            fade: 1 - dist / CONSTELLATION_DIST
                        });
                    }
                }
            }
        }
        function drawConstellations() {
            constellationLines.forEach(function(line) {
                var a = line.a, b = line.b;
                var isHovered = (hoveredStar === a || hoveredStar === b);
                var alpha = (isHovered ? 0.25 : 0.06) * line.fade;
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.strokeStyle = isHovered
                    ? getStarColor((a.warmth + b.warmth) / 2, alpha)
                    : 'rgba(140, 170, 210, ' + alpha + ')';
                ctx.lineWidth = isHovered ? 1.2 : 0.6;
                ctx.stroke();
            });
        }

        // ── Draw Stars ──
        function drawStars() {
            starNodes.forEach(function(s) {
                var pulse = 0.7 + 0.3 * Math.sin(time * s.pulseSpeed + s.phase);
                var isHovered = hoveredStar === s;
                var r = s.radius * (isHovered ? 1.5 : 1) * pulse;
                var glowR = r * (isHovered ? 6 : 3.5);

                // Outer glow
                var glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, glowR);
                var glowAlpha = (isHovered ? 0.2 : 0.08) * pulse;
                glow.addColorStop(0, getStarColor(s.warmth, glowAlpha));
                glow.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.beginPath();
                ctx.arc(s.x, s.y, glowR, 0, Math.PI * 2);
                ctx.fillStyle = glow;
                ctx.fill();

                // Core
                ctx.beginPath();
                ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
                var coreAlpha = isHovered ? 1 : 0.85 * pulse;
                ctx.fillStyle = getStarColor(s.warmth, coreAlpha);
                ctx.fill();

                // Bright center
                ctx.beginPath();
                ctx.arc(s.x, s.y, r * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, ' + (isHovered ? 0.9 : 0.6) * pulse + ')';
                ctx.fill();
            });
        }

        // ── Shooting Stars ──
        var shootingStars = [];
        function maybeSpawnShootingStar() {
            if (Math.random() > 0.002 || shootingStars.length > 2) return;
            shootingStars.push({
                x: Math.random() * W * 0.8,
                y: Math.random() * H * 0.3,
                vx: 3 + Math.random() * 4,
                vy: 1.5 + Math.random() * 2.5,
                life: 1,
                len: 40 + Math.random() * 60
            });
        }
        function drawShootingStars() {
            for (var i = shootingStars.length - 1; i >= 0; i--) {
                var s = shootingStars[i];
                s.x += s.vx;
                s.y += s.vy;
                s.life -= 0.015;
                if (s.life <= 0) { shootingStars.splice(i, 1); continue; }
                var grad = ctx.createLinearGradient(
                    s.x, s.y,
                    s.x - s.vx * s.len / 5, s.y - s.vy * s.len / 5
                );
                grad.addColorStop(0, 'rgba(220, 230, 240, ' + s.life * 0.8 + ')');
                grad.addColorStop(1, 'rgba(220, 230, 240, 0)');
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(s.x - s.vx * s.len / 5, s.y - s.vy * s.len / 5);
                ctx.strokeStyle = grad;
                ctx.lineWidth = 1.2;
                ctx.stroke();
            }
        }

        // ── Mouse Halo ──
        function drawMouseHalo() {
            if (mouseX < 0) return;
            var grad = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 100);
            grad.addColorStop(0, 'rgba(168, 204, 136, 0.03)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 100, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
        }

        // ── Hit Test ──
        function hitTest(mx, my) {
            var best = null, bestDist = 30;
            starNodes.forEach(function(s) {
                var dx = s.x - mx, dy = s.y - my;
                var dist = Math.sqrt(dx * dx + dy * dy);
                var hitR = Math.max(s.radius * 3, 18);
                if (dist < hitR && dist < bestDist) {
                    best = s;
                    bestDist = dist;
                }
            });
            return best;
        }

        // ── Tooltip ──
        function showTooltip(star) {
            document.getElementById('tooltipNick').textContent = star.nickname;
            document.getElementById('tooltipText').textContent = star.content;
            var d = star.parsedDate || parseDbDate(star.created_at);
            document.getElementById('tooltipTime').textContent = d
                ? d.getFullYear() + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + String(d.getDate()).padStart(2, '0')
                : '—';

            var tx = star.x + 20;
            var ty = star.y - 20;
            if (tx + 280 > W) tx = star.x - 300;
            if (ty + 120 > H) ty = H - 130;
            if (ty < 10) ty = 10;

            tooltip.style.left = tx + 'px';
            tooltip.style.top = ty + 'px';
            tooltip.classList.add('visible');
        }

        function hideTooltip() {
            tooltip.classList.remove('visible');
        }

        // ── Delete Zones ──
        var deleteZones = [];
        function clearDeleteZones() {
            deleteZones.forEach(function(el) { el.remove(); });
            deleteZones = [];
        }
        function createDeleteZones() {
            clearDeleteZones();
            starNodes.forEach(function(s) {
                if (!isAdmin && s.nickname !== currentNickname) return;
                var el = document.createElement('div');
                el.className = 'delete-zone';
                el.textContent = '×';
                el.style.left = (s.x + s.radius + 6) + 'px';
                el.style.top = (s.y - s.radius - 6) + 'px';
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (confirm('确定删除这条留言？')) deleteMessage(s.id);
                });
                document.body.appendChild(el);
                deleteZones.push(el);
            });
        }

        function updateDeleteZoneVisibility() {
            var show = hoveredStar && (isAdmin || hoveredStar.nickname === currentNickname);
            deleteZones.forEach(function(el) {
                var sx = parseFloat(el.style.left);
                var sy = parseFloat(el.style.top);
                if (show && hoveredStar) {
                    var dx = hoveredStar.x + hoveredStar.radius + 6 - sx;
                    var dy = hoveredStar.y - hoveredStar.radius - 6 - sy;
                    if (Math.abs(dx) < 2 && Math.abs(dy) < 2) {
                        el.classList.add('visible');
                    } else {
                        el.classList.remove('visible');
                    }
                } else if (isAdmin) {
                    el.classList.add('visible');
                } else {
                    el.classList.remove('visible');
                }
            });
        }

        // ── Main Loop ──
        function drawScene() {
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, W, H);

            if (Math.floor(time * 60) % 3 === 0) drawBackground();
            if (!reducedMotion) maybeSpawnShootingStar();
            drawMouseHalo();
            drawConstellations();
            drawStars();
            if (!reducedMotion) drawShootingStars();
        }

        function frame() {
            animationId = null;
            if (!pageActive || document.hidden || reducedMotion) {
                drawScene();
                return;
            }
            time += 0.016;
            drawScene();
            animationId = requestAnimationFrame(frame);
        }

        function startAnimation() {
            if (reducedMotion || !pageActive || document.hidden || animationId) return;
            animationId = requestAnimationFrame(frame);
        }

        function stopAnimation() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }

        function handleReducedMotionChange(e) {
            reducedMotion = e.matches;
            if (reducedMotion) stopAnimation();
            else startAnimation();
            drawScene();
        }
        if (reducedMotionQuery.addEventListener) {
            reducedMotionQuery.addEventListener('change', handleReducedMotionChange);
        } else if (reducedMotionQuery.addListener) {
            reducedMotionQuery.addListener(handleReducedMotionChange);
        }

        // ── Pointer Events ──
        mainCanvas.style.pointerEvents = 'auto';
        mainCanvas.style.touchAction = 'manipulation';
        mainCanvas.addEventListener('pointermove', function(e) {
            if (e.pointerType === 'touch') return;
            mouseX = e.clientX;
            mouseY = e.clientY;
            var hit = hitTest(mouseX, mouseY);
            if (hit !== hoveredStar) {
                hoveredStar = hit;
                mainCanvas.style.cursor = hit ? 'pointer' : 'crosshair';
                if (hit) {
                    showTooltip(hit);
                } else {
                    hideTooltip();
                }
                updateDeleteZoneVisibility();
                if (reducedMotion) drawScene();
            }
        });

        // touch lift fires pointerleave — skip; tooltip dismissed via pointerdown on empty space
        mainCanvas.addEventListener('pointerleave', function(e) {
            if (e.pointerType === 'touch') return;
            mouseX = mouseY = -1000;
            hoveredStar = null;
            hideTooltip();
            mainCanvas.style.cursor = 'crosshair';
        });

        mainCanvas.addEventListener('pointerdown', function(e) {
            if (e.pointerType === 'mouse') return;
            try { mainCanvas.setPointerCapture(e.pointerId); } catch (captureError) {}
            mouseX = e.clientX;
            mouseY = e.clientY;
            var hit = hitTest(mouseX, mouseY);
            hoveredStar = hit;
            if (hit) {
                showTooltip(hit);
            } else {
                hideTooltip();
            }
            updateDeleteZoneVisibility();
            if (reducedMotion) drawScene();
        });
        mainCanvas.addEventListener('pointerup', function(e) {
            if (mainCanvas.hasPointerCapture && mainCanvas.hasPointerCapture(e.pointerId)) {
                mainCanvas.releasePointerCapture(e.pointerId);
            }
        });
        mainCanvas.addEventListener('pointercancel', function(e) {
            if (mainCanvas.hasPointerCapture && mainCanvas.hasPointerCapture(e.pointerId)) {
                mainCanvas.releasePointerCapture(e.pointerId);
            }
        });

        // ── API ──
        var retryLoad = document.getElementById('retryLoad');

        function setLoadError(hasError) {
            retryLoad.hidden = !hasError;
        }

        async function loadMessages() {
            setLoadError(false);
            try {
                var res = await compat.fetchWithTimeout(API_URL + '/api/messages', {}, 10000);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                var payload = await res.json();
                if (!Array.isArray(payload)) throw new TypeError('Unexpected messages response');
                messages = payload.filter(function(message) {
                    return message && typeof message === 'object';
                });
                document.getElementById('msgCount').textContent = messages.length;
                buildStarNodes(messages);
                createDeleteZones();
                if (reducedMotion) drawScene();
            } catch (err) {
                console.warn('Failed to load messages:', err);
                setLoadError(true);
            }
        }

        retryLoad.addEventListener('click', loadMessages);

        async function deleteMessage(id) {
            try {
                var headers = { 'Content-Type': 'application/json' };
                if (isAdmin) headers['X-Admin-Token'] = storage.get('admin_token', '') || '';
                var res = await compat.fetchWithTimeout(API_URL + '/api/messages/' + id, {
                    method: 'DELETE', headers: headers
                }, 10000);
                if (res.ok) {
                    hideTooltip();
                    hoveredStar = null;
                    loadMessages();
                } else {
                    alert('删除失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }

        // ── Modal focus and scroll handling ──
        var activeModal = null;
        var modalPreviousFocus = null;

        function getModalFocusables(modal) {
            return Array.prototype.slice.call(modal.querySelectorAll(
                'button, input, textarea, select, a[href], [tabindex]:not([tabindex="-1"])'
            )).filter(function(el) {
                return !el.disabled && el.offsetParent !== null;
            });
        }

        function openModal(modal, firstField) {
            if (activeModal && activeModal !== modal) closeModal(activeModal);
            modalPreviousFocus = document.activeElement;
            activeModal = modal;
            modal.hidden = false;
            modal.classList.add('active');
            modal.setAttribute('aria-hidden', 'false');
            compat.lockBodyScroll();
            setTimeout(function() {
                (firstField || getModalFocusables(modal)[0] || modal).focus({ preventScroll: true });
            }, 0);
        }

        function closeModal(modal) {
            if (!modal) return;
            modal.classList.remove('active');
            modal.setAttribute('aria-hidden', 'true');
            modal.hidden = true;
            if (activeModal === modal) activeModal = null;
            compat.unlockBodyScroll();
            var focusTarget = modalPreviousFocus && document.contains(modalPreviousFocus) ? modalPreviousFocus : postBtn;
            modalPreviousFocus = null;
            if (focusTarget) focusTarget.focus({ preventScroll: true });
        }

        function trapModalKey(e) {
            if (!activeModal || e.key !== 'Tab') return;
            var items = getModalFocusables(activeModal);
            if (!items.length) return;
            var first = items[0], last = items[items.length - 1];
            if (e.shiftKey && document.activeElement === first) {
                e.preventDefault();
                last.focus();
            } else if (!e.shiftKey && document.activeElement === last) {
                e.preventDefault();
                first.focus();
            }
        }

        // ── Post Modal ──
        var postModal = document.getElementById('postModal');
        var postBtn = document.getElementById('postBtn');
        var cancelPost = document.getElementById('cancelPost');
        var submitPost = document.getElementById('submitPost');

        postBtn.addEventListener('click', function() {
            openModal(postModal, document.getElementById('nickname'));
            if (currentNickname) document.getElementById('nickname').value = currentNickname;
        });

        cancelPost.addEventListener('click', function() { closeModal(postModal); });
        postModal.addEventListener('click', function(e) {
            if (e.target === postModal) closeModal(postModal);
        });

        async function handleSubmitPost() {
            var nicknameInput = document.getElementById('nickname');
            var contentInput = document.getElementById('content');
            var nickname = nicknameInput.value.trim();
            var content = contentInput.value.trim();

            if (!nickname || !content) { alert('请填写昵称和内容'); return; }

            submitPost.disabled = true;
            submitPost.textContent = '发布中…';

            try {
                var res = await compat.fetchWithTimeout(API_URL + '/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname: nickname, content: content })
                }, 15000);

                if (res.ok) {
                    storage.set('universe_nick', nickname);
                    currentNickname = nickname;
                    nicknameInput.value = '';
                    contentInput.value = '';
                    closeModal(postModal);
                    loadMessages();
                } else {
                    var err = {};
                    try { err = await res.json(); } catch (parseError) {}
                    alert(err.error || '发布失败');
                }
            } catch (err) {
                alert('网络错误，请检查网络连接后重试');
            } finally {
                submitPost.disabled = false;
                submitPost.textContent = '发布';
            }
        }

        submitPost.addEventListener('click', handleSubmitPost);
        document.getElementById('content').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) handleSubmitPost();
        });

        // ── Admin Modal ──
        var adminModal = document.getElementById('adminModal');
        var adminBtn = document.getElementById('adminBtn');
        var cancelAdmin = document.getElementById('cancelAdmin');
        var submitAdmin = document.getElementById('submitAdmin');

        adminBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (isAdmin) {
                isAdmin = false;
                document.body.classList.remove('admin-mode');
                storage.remove('admin_token');
                adminBtn.textContent = 'ADM';
                loadMessages();
            } else {
                openModal(adminModal, document.getElementById('adminPassword'));
            }
        });

        cancelAdmin.addEventListener('click', function() { closeModal(adminModal); });
        adminModal.addEventListener('click', function(e) {
            if (e.target === adminModal) closeModal(adminModal);
        });

        submitAdmin.addEventListener('click', async function() {
            var password = document.getElementById('adminPassword').value;
            if (!password) return;
            try {
                var res = await compat.fetchWithTimeout(API_URL + '/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password })
                }, 10000);
                if (res.ok) {
                    var data = await res.json();
                    storage.set('admin_token', data.token);
                    isAdmin = true;
                    document.body.classList.add('admin-mode');
                    adminBtn.textContent = '退出';
                    closeModal(adminModal);
                    document.getElementById('adminPassword').value = '';
                    loadMessages();
                } else {
                    alert('密码错误');
                }
            } catch (err) {
                alert('网络错误');
            }
        });

        // ── Keyboard ──
        document.addEventListener('keydown', function(e) {
            trapModalKey(e);
            if (e.key !== 'Escape' || !activeModal) return;
            closeModal(activeModal);
        });

        window.addEventListener('pagehide', function() {
            if (activeModal) closeModal(activeModal);
        });
        window.addEventListener('pageshow', function() {
            if (activeModal) closeModal(activeModal);
        });

        // ── Init ──
        if (storage.get('admin_token', '')) {
            isAdmin = true;
            document.body.classList.add('admin-mode');
            adminBtn.textContent = '退出';
        }

        resize();
        window.addEventListener('resize', function() {
            resize();
            buildStarNodes(messages);
            createDeleteZones();
            if (reducedMotion) drawScene();
        });

        loadMessages();
        document.addEventListener('visibilitychange', function() {
            pageActive = !document.hidden;
            if (pageActive) startAnimation();
            else stopAnimation();
        });
        window.addEventListener('pagehide', function() {
            pageActive = false;
            stopAnimation();
        });
        window.addEventListener('pageshow', function() {
            pageActive = true;
            if (reducedMotion) drawScene();
            else startAnimation();
        });
        if (reducedMotion) drawScene();
        else startAnimation();

    })();
    </script>
</body>
</html>
