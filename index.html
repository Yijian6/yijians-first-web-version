<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>觉 | Yijian — The Awakening</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Scroll Progress -->
    <div class="progress-track"><div class="progress-bar"></div></div>

    <!-- Mobile Menu (outside #main to avoid transform containing block) -->
    <div class="mobile-menu">
        <a href="index.html" class="mobile-link active"><span class="mobile-menu-index">00</span> Home</a>
        <a href="work.html" class="mobile-link"><span class="mobile-menu-index">01</span> Work</a>
        <a href="offer.html" class="mobile-link"><span class="mobile-menu-index">02</span> Offer</a>
        <a href="me.html" class="mobile-link"><span class="mobile-menu-index">03</span> Me</a>
        <a href="passion.html" class="mobile-link"><span class="mobile-menu-index">04</span> Passion</a>
        <a href="prediction.html" class="mobile-link"><span class="mobile-menu-index">05</span> Becoming</a>
    </div>

    <!-- Main -->
    <div id="main" class="main">

        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-brand">觉 <span>|</span> Yijian</div>
            <div class="nav-links">
                <a href="work.html" class="nav-link" data-index="01">Work</a>
                <a href="offer.html" class="nav-link" data-index="02">Offer</a>
                <a href="me.html" class="nav-link" data-index="03">Me</a>
                <a href="passion.html" class="nav-link" data-index="04">Passion</a>
                <a href="prediction.html" class="nav-link" data-index="05">Becoming</a>
            </div>
            <button class="hamburger" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </nav>

        <!-- Scene 1: 静 — The Character -->
        <section class="scene scene-still">
            <div class="scene-still-char">觉</div>
        </section>

        <!-- Scene 2: 声 — The Statement -->
        <section class="scene scene-voice">
            <h1 class="scene-voice-title reveal">
                我在<em class="warm">觉醒</em>中
            </h1>
            <h1 class="scene-voice-title scene-voice-offset reveal delay-1">
                寻找<em>方向</em>
            </h1>
            <p class="scene-voice-sub reveal delay-3">
                从零开始，用代码和思考<br>构建自己的世界
            </p>
        </section>

        <!-- Scene 3: 像 — The Portrait -->
        <section class="scene scene-portrait">
            <div class="scene-portrait-wrap">
                <div class="scene-portrait-text reveal">
                    <span class="scene-portrait-name">刘奕健</span>
                    <span class="scene-portrait-tag">Yijian Liu, b. 2006</span>
                </div>
                <div class="scene-portrait-photo reveal-scale">
                    <img src="照片.jpg" alt="刘奕健 / Yijian Liu">
                </div>
            </div>
        </section>

        <!-- Scene 4: 言 — The Words -->
        <section class="scene scene-words">
            <blockquote class="scene-words-quote reveal">
                无人扶我青云志
            </blockquote>
            <blockquote class="scene-words-quote scene-words-second reveal delay-2">
                我自踏雪至山巅
            </blockquote>
        </section>

        <!-- Scene 5: 路 — The Path -->
        <section class="scene scene-path">
            <div class="scene-path-label reveal">EXPLORE</div>
            <nav class="scene-path-grid">
                <a href="work.html" class="scene-path-link reveal delay-1">
                    <span class="scene-path-name">Work</span>
                    <span class="scene-path-desc">项目与作品</span>
                </a>
                <a href="offer.html" class="scene-path-link reveal delay-2">
                    <span class="scene-path-name">Offer</span>
                    <span class="scene-path-desc">我能提供的</span>
                </a>
                <a href="me.html" class="scene-path-link reveal delay-3">
                    <span class="scene-path-name">Me</span>
                    <span class="scene-path-desc">关于我</span>
                </a>
                <a href="passion.html" class="scene-path-link reveal delay-4">
                    <span class="scene-path-name">Passion</span>
                    <span class="scene-path-desc">热爱的事</span>
                </a>
                <a href="prediction.html" class="scene-path-link reveal delay-5">
                    <span class="scene-path-name">Becoming</span>
                    <span class="scene-path-desc">我在成为</span>
                </a>
            </nav>
            <div class="scene-path-contact reveal delay-6">
                <p><a href="mailto:lyijian86@gmail.com">lyijian86@gmail.com</a></p>
            </div>
        </section>

    </div>

    <script src="js/script.js"></script>
</body>
</html>
