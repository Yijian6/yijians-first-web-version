<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Minecraft — 觉</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .mc-scene {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 120px var(--side-pad) 60px;
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(1px 1px at 7% 14%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 18% 42%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1.5px 1.5px at 32% 8%, rgba(255,255,255,0.55), transparent),
                radial-gradient(1px 1px at 44% 55%, rgba(255,255,255,0.25), transparent),
                radial-gradient(1.5px 1.5px at 58% 18%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 71% 62%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1px 1px at 83% 9%, rgba(255,255,255,0.45), transparent),
                radial-gradient(1.5px 1.5px at 12% 72%, rgba(255,255,255,0.35), transparent),
                radial-gradient(1px 1px at 51% 34%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 66% 78%, rgba(255,255,255,0.25), transparent),
                radial-gradient(1.5px 1.5px at 89% 44%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 38% 88%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1px 1px at 95% 22%, rgba(255,255,255,0.35), transparent),
                radial-gradient(1px 1px at 4% 56%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1.5px 1.5px at 76% 36%, rgba(255,255,255,0.45), transparent),
                radial-gradient(1px 1px at 24% 92%, rgba(255,255,255,0.25), transparent),
                linear-gradient(180deg, #080c18 0%, #0c1024 50%, #111630 100%);
        }

        .mc-scene::after {
            content: '';
            position: absolute;
            top: 12%;
            right: 10%;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(240,238,210,0.12) 0%, transparent 70%);
            box-shadow: 0 0 40px 16px rgba(240,238,210,0.04);
            pointer-events: none;
        }

        .mc-sign-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .mc-sign {
            max-width: 400px;
            width: 85vw;
            padding: 24px 28px;
            background:
                repeating-linear-gradient(
                    180deg,
                    transparent 0px,
                    transparent 13px,
                    rgba(0,0,0,0.06) 13px,
                    rgba(0,0,0,0.06) 15px
                ),
                linear-gradient(180deg, #c8a96e 0%, #b89558 100%);
            border: 4px solid #4a3728;
            box-shadow:
                inset 0 2px 0 rgba(255,255,255,0.12),
                inset 0 -2px 0 rgba(0,0,0,0.08),
                0 6px 32px rgba(0,0,0,0.6);
            text-align: center;
        }

        .mc-sign p {
            font-family: var(--font-mono);
            font-size: clamp(13px, 2.5vw, 16px);
            color: #3d2b1a;
            line-height: 2.2;
            letter-spacing: 0.03em;
            margin: 0;
        }

        .mc-post {
            width: 14px;
            height: 72px;
            background: linear-gradient(90deg, #5e4128 0%, #7a5535 45%, #5e4128 100%);
            border-left: 2px solid #4a3728;
            border-right: 2px solid #4a3728;
            border-bottom: 2px solid #4a3728;
        }

        /* ===== 世界横带：告示牌和建筑站在同一条地面上 ===== */
        .mcw-strip {
            max-width: min(1100px, 94vw);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .mcw-strip::-webkit-scrollbar {
            display: none;
        }

        .mcw-inner {
            display: flex;
            flex-direction: column;
            min-width: 100%;
            width: max-content;
        }

        .mcw-row {
            display: flex;
            align-items: flex-end;
            gap: 44px;
            width: max-content;
            margin: 0 auto;
            padding: 0 32px;
        }

        .mcw-building {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            text-decoration: none;
            position: relative;
            transition: transform 0.5s var(--ease-out-expo);
            animation: mcwRise 0.9s var(--ease-out-expo) both;
        }

        .mcw-building:hover {
            transform: translateY(-5px);
        }

        @keyframes mcwRise {
            from { opacity: 0; transform: translateY(16px); }
        }

        .mcw-scaffold {
            width: 88px;
            height: 16px;
            border: 2px dashed rgba(200, 169, 110, 0.45);
            border-bottom: none;
            position: relative;
        }

        .mcw-scaffold--vine::after {
            content: '🌿';
            position: absolute;
            top: -9px;
            right: -7px;
            font-size: 13px;
        }

        .mcw-ghost {
            width: 88px;
            border: 2px dashed rgba(168, 204, 136, 0.22);
            border-bottom: none;
            display: block;
        }

        .mcw-body {
            width: 88px;
            background: #3a4a5c;
            border: 2px solid #22303f;
            display: flex;
            flex-direction: column;
        }

        .mcw-floor-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            padding: 7px 0;
        }

        .mcw-win {
            width: 10px;
            height: 10px;
            background: rgba(232, 196, 106, 0.55);
        }

        .mcw-win--dim {
            background: rgba(232, 196, 106, 0.22);
        }

        .mcw-win--bright {
            background: #e8c46a;
            box-shadow: 0 0 9px rgba(232, 196, 106, 0.55);
        }

        .mcw-name {
            position: absolute;
            top: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            width: max-content;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.1em;
            color: var(--white-90);
            z-index: 1;
        }

        .mcw-stat {
            position: absolute;
            top: calc(100% + 25px);
            left: 50%;
            transform: translateX(-50%);
            width: max-content;
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.08em;
            color: rgba(228, 224, 216, 0.45);
            z-index: 1;
        }

        /* ===== 冒险日志 ===== */
        .mcw-log {
            margin-top: 56px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .mcw-log-title {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.3em;
            color: var(--white-30);
            margin-bottom: 4px;
        }

        .mcw-log-line {
            display: flex;
            align-items: baseline;
            gap: 12px;
            font-family: var(--font-mono);
            font-size: 12px;
            text-decoration: none;
            color: var(--white-60);
            transition: color 0.3s ease;
        }

        .mcw-log-line:hover {
            color: var(--gold);
        }

        .mcw-log-date {
            color: var(--white-30);
            font-size: 11px;
        }

        .mcw-log-domain {
            color: var(--gold);
            font-size: 11px;
        }

        .mc-ground {
            width: 100%;
            min-width: min(560px, 90vw);
            margin-top: -2px;
        }

        .mcw-hint {
            margin-top: 18px;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.2em;
            color: var(--white-30);
            animation: mcwHintPulse 2.6s ease-in-out infinite;
        }

        @keyframes mcwHintPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* 手机端：缩小告示牌，让第一栋楼露出一角，暗示可以横滑 */
        @media (max-width: 600px) {
            .mcw-row:not(:only-child) .mc-sign,
            .mcw-row.has-buildings .mc-sign {
                width: 60vw;
                padding: 18px 16px;
            }

            .mcw-row.has-buildings {
                gap: 30px;
                padding: 0 20px;
            }
        }

        .mc-grass-top {
            height: 6px;
            background: #6fa34a;
        }

        .mc-grass {
            height: 10px;
            background:
                repeating-linear-gradient(
                    90deg,
                    #5d8a3c 0px, #5d8a3c 15px,
                    #53802e 15px, #53802e 16px
                );
        }

        .mc-dirt {
            height: 32px;
            background:
                repeating-linear-gradient(
                    90deg,
                    #8b6240 0px, #8b6240 15px,
                    #7a5535 15px, #7a5535 16px
                );
            border-bottom: 3px solid #5e4128;
        }

        .mc-back {
            margin-top: 48px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--white-60);
            text-decoration: none;
            transition: color 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .mc-back:hover {
            color: var(--gold);
        }

        .mc-back svg {
            width: 16px;
            height: 16px;
        }

        @media (max-width: 480px) {
            .mc-sign {
                padding: 20px 20px;
            }

            .mc-post {
                height: 56px;
            }

            .mc-scene::after {
                top: 8%;
                right: 6%;
                width: 36px;
                height: 36px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .mc-scene::before {
                animation: none;
            }
        }
    </style>
</head>
