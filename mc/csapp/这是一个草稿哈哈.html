        :root {
            --font-display-mc: 'Lora', 'Songti SC', 'SimSun', serif;

        .mca-wrap {
            max-width: 720px;
            margin: 0 auto;
            padding: 48px var(--side-pad) 0;
        }

        .mca-crumb {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.15em;
            color: var(--gold);
            text-decoration: none;
            margin-bottom: 28px;
        }

        .mca-crumb:hover {
            color: var(--gold-bright);
        }

        .mca-title {
            font-family: var(--font-display-mc);
            font-size: clamp(30px, 6vw, 44px);
            font-weight: 400;
            line-height: 1.25;
            letter-spacing: -0.02em;
            color: var(--white);
            margin-bottom: 14px;
        }

        .mca-meta {
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.08em;
            color: var(--white-30);
            margin-bottom: 28px;
        }

        .mca-rule {
            height: 1px;
            background: var(--white-10);
            margin-bottom: 40px;
        }

        .mca-body {
            font-size: clamp(15px, 2vw, 16px);
            font-weight: 300;
            line-height: 2;
            color: var(--white-60);
        }

        .mca-body h2 {
            font-family: var(--font-display-mc);
            font-size: clamp(22px, 3.5vw, 28px);
            font-weight: 400;
            color: var(--white);
            margin: 48px 0 16px;
        }

        .mca-body h3 {
            font-family: var(--font-display-mc);
            font-size: clamp(18px, 3vw, 22px);
            font-weight: 400;
            color: var(--white-90);
            margin: 36px 0 12px;
        }

        .mca-body p {
            margin-bottom: 20px;
        }

        .mca-body strong {
            color: var(--white-90);
            font-weight: 500;
        }

        .mca-body em {
            color: var(--gold);
            font-style: normal;
        }

        .mca-body a {
            color: var(--gold);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .mca-body blockquote {
            border-left: 3px solid var(--gold-dim);
            padding: 4px 0 4px 18px;
            margin: 24px 0;
            color: var(--white-30);
        }

        .mca-body blockquote p:last-child {
            margin-bottom: 0;
        }

        .mca-body ul, .mca-body ol {
            margin: 0 0 20px;
            padding-left: 24px;
        }

        .mca-body li {
            margin-bottom: 8px;
        }

        .mca-body li::marker {
            color: var(--gold);
        }

        .mca-body code {
            font-family: var(--font-mono);
            font-size: 0.88em;
            color: var(--gold-bright);
            background: var(--bg-surface);
            padding: 2px 6px;
            border-radius: 2px;
        }

        .mca-body pre {
            background: var(--bg-surface);
            border: 1px solid var(--white-10);
            border-left: 3px solid var(--gold);
            border-radius: 2px;
            padding: 18px 20px;
            margin: 24px 0;
            overflow-x: auto;
        }

        .mca-body pre code {
            background: none;
            padding: 0;
            font-size: 13px;
            line-height: 1.9;
            color: var(--white-60);
        }

        .mca-body img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 28px auto;
            border: 1px solid var(--white-10);
            border-radius: 2px;
        }

        .mca-body hr {
            border: none;
            height: 1px;
            background: var(--white-10);
            margin: 40px 0;
        }

        .mc-table-wrap {
            overflow-x: auto;
            margin: 24px 0;
        }

        .mca-body table {
            border-collapse: collapse;
            font-size: 14px;
            min-width: 320px;
        }

        .mca-body th, .mca-body td {
            border: 1px solid var(--white-10);
            padding: 10px 14px;
            text-align: left;
        }

        .mca-body th {
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.08em;
            color: var(--gold);
            background: var(--bg-surface);
        }

        .mca-stairs {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            max-width: 720px;
            margin: 64px auto 0;
            padding: 24px var(--side-pad) 48px;
            border-top: 1px solid var(--white-10);
        }

        .mca-stair {
            font-family: var(--font-mono);
            font-size: 13px;
            letter-spacing: 0.05em;
            color: var(--white-60);
            text-decoration: none;
            transition: color 0.3s ease;
            max-width: 46%;
        }

        .mca-stair:hover {
            color: var(--gold);
        }

        .mca-stair--next {
            text-align: right;
            margin-left: auto;
        }
