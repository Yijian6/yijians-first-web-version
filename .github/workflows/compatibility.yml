name: compatibility

on:
  pull_request:
  push:
    branches: [master]

jobs:
  compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip playwright
      - run: python -m playwright install --with-deps chromium firefox webkit
      - run: npm run verify
